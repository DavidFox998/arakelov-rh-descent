name: Lean CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install elan
      run: curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
    - name: Add elan to PATH
      run: echo "$HOME/.elan/bin" >> $GITHUB_PATH
    - name: Cache Mathlib oleans
      uses: actions/cache@v4
      with:
        path: .lake
        key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean') }}
        restore-keys: |
          lake-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-
    - name: Fetch Mathlib cache
      run: lake exe cache get || true
    - name: Build project
      run: lake build
      timeout-minutes: 360
